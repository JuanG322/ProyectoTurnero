<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar contraseña</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'blue': '#0960ae', 'light-blue': '#007dbf',
                        'Dark-Grey': '#515151', 'Light-Grey': '#848484',
                        'white': '#ffffff', 'soft-border': '#d1d5db',
                        'dark-bg': '#121212', 'dark-card': '#1e1e1e',
                        'dark-text': '#e5e7eb', 'dark-border': '#374151',
                        'alert-bg': '#eff6ff'
                    },
                },
            },
        }
    </script>
</head>
<body class="bg-white dark:bg-dark-bg min-h-screen flex flex-col items-center justify-center font-sans transition-colors duration-300 relative">

    <button onclick="toggleTheme()" class="absolute top-5 right-5 p-2.5 rounded-full bg-soft-border dark:bg-dark-border text-Dark-Grey dark:text-dark-text hover:bg-Light-Grey dark:hover:bg-Dark-Grey transition-colors shadow-sm flex items-center justify-center">
        <span id="theme-icon" class="material-symbols-outlined">dark_mode</span>
    </button>

    <div class="mb-8 text-center mt-10">
        <h1 class="text-2xl font-bold text-blue dark:text-light-blue leading-tight transition-colors duration-300">
            Empresa de Salud
        </h1>
    </div>

    <div class="bg-white dark:bg-dark-card border border-soft-border dark:border-dark-border rounded-lg shadow-sm p-8 w-full max-w-md transition-colors duration-300">
        <h2 class="text-xl text-Dark-Grey dark:text-dark-text text-center mb-6 font-medium transition-colors duration-300">Recuperar contraseña</h2>

        <p class="text-sm text-Dark-Grey dark:text-dark-text text-center mb-6 transition-colors duration-300">
            Ingresa tu correo electrónico y te enviaremos un enlace para restablecer tu contraseña.
        </p>

        <form method="post" class="flex flex-col gap-5">
            {% csrf_token %}

            <div class="flex flex-col gap-1">
                <label for="id_email" class="text-sm text-Dark-Grey dark:text-dark-text ml-3 font-medium transition-colors duration-300">Correo electrónico</label>
                <input
                    type="email"
                    name="email"
                    id="id_email"
                    required
                    placeholder="ejemplo@empresa.com"
                    class="w-full border border-soft-border dark:border-dark-border text-Dark-Grey dark:text-dark-text rounded-full px-5 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue focus:border-transparent bg-white dark:bg-dark-card placeholder-Light-Grey transition-colors duration-300"
                >
            </div>

            <button
                type="submit"
                class="bg-blue hover:bg-light-blue text-white font-medium py-2.5 px-6 rounded-full transition-colors w-full mt-2"
            >
                Enviar enlace
            </button>
        </form>

        <div class="text-center mt-6 text-sm text-Dark-Grey dark:text-dark-text transition-colors duration-300">
            <a href="{% url 'inicio' %}" class="text-blue dark:text-light-blue hover:text-light-blue dark:hover:text-blue hover:underline transition-colors">Volver al inicio de sesión</a>
        </div>
    </div>

    <script>
        function toggleTheme() {
            const htmlTag = document.documentElement;
            const themeIcon = document.getElementById('theme-icon');
            if (htmlTag.classList.contains('dark')) {
                htmlTag.classList.remove('dark');
                themeIcon.innerText = 'dark_mode';
            } else {
                htmlTag.classList.add('dark');
                themeIcon.innerText = 'light_mode';
            }
        }
    </script>
</body>
</html>
