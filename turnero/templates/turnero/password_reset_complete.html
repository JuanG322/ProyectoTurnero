<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contraseña actualizada</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'blue': '#0960ae', 'light-blue': '#007dbf',
                        'Dark-Grey': '#515151', 'Light-Grey': '#848484',
                        'white': '#ffffff', 'soft-border': '#d1d5db',
                        'dark-bg': '#121212', 'dark-card': '#1e1e1e',
                        'dark-text': '#e5e7eb', 'dark-border': '#374151',
                        'alert-bg': '#eff6ff'
                    },
                },
            },
        }
    </script>
</head>
<body class="bg-white dark:bg-dark-bg min-h-screen flex flex-col items-center justify-center font-sans transition-colors duration-300 relative">

    <button onclick="toggleTheme()" class="absolute top-5 right-5 p-2.5 rounded-full bg-soft-border dark:bg-dark-border text-Dark-Grey dark:text-dark-text hover:bg-Light-Grey dark:hover:bg-Dark-Grey transition-colors shadow-sm flex items-center justify-center">
        <span id="theme-icon" class="material-symbols-outlined">dark_mode</span>
    </button>

    <div class="mb-8 text-center mt-10">
        <h1 class="text-2xl font-bold text-blue dark:text-light-blue leading-tight transition-colors duration-300">
            Empresa de Salud
        </h1>
    </div>

    <div class="bg-white dark:bg-dark-card border border-soft-border dark:border-dark-border rounded-lg shadow-sm p-8 w-full max-w-md text-center transition-colors duration-300">
        <h2 class="text-xl text-Dark-Grey dark:text-dark-text mb-4 font-medium transition-colors duration-300">Contraseña actualizada</h2>

        <p class="text-sm text-Dark-Grey dark:text-dark-text leading-relaxed mb-8 transition-colors duration-300">
            Tu contraseña fue cambiada correctamente. Ya puedes volver a iniciar sesión de forma segura.
        </p>

        <a
            href="{% url 'inicio' %}"
            class="inline-block bg-blue hover:bg-light-blue text-white font-medium py-2.5 px-6 rounded-full transition-colors w-full"
        >
            Ir al inicio de sesión
        </a>
    </div>

    <script>
        function toggleTheme() {
            const htmlTag = document.documentElement;
            const themeIcon = document.getElementById('theme-icon');
            if (htmlTag.classList.contains('dark')) {
                htmlTag.classList.remove('dark');
                themeIcon.innerText = 'dark_mode';
            } else {
                htmlTag.classList.add('dark');
                themeIcon.innerText = 'light_mode';
            }
        }
    </script>
</body>
</html>
