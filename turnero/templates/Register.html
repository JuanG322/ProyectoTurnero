<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Empresa de Salud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: 'media', 
            theme: {
                extend: {
                    colors: {
                        'blue': '#0960ae',
                        'light-blue': '#007dbf',
                        'Dark-Grey': '#515151',
                        'Light-Grey': '#848484',
                        'dark-bg': '#121212',
                        'dark-card': '#1e1e1e'
                    },
                },
            },
        }
    </script>
</head>
<body class="bg-white dark:bg-dark-bg min-h-screen flex flex-col items-center justify-center font-sans py-10 transition-colors duration-300">

    <div class="mb-6 text-center">
        <h1 class="text-2xl font-bold text-blue dark:text-light-blue leading-tight transition-colors duration-300">
            Empresa de Salud
        </h1>
    </div>

    <div class="bg-white dark:bg-dark-card border border-gray-300 dark:border-gray-700 rounded-lg shadow-sm p-8 w-full max-w-md transition-colors duration-300">
        
        <div class="mb-6">
            <h2 class="text-2xl text-Dark-Grey dark:text-gray-200 font-bold text-center transition-colors duration-300">Crear una cuenta</h2>
        </div>

        <form class="flex flex-col gap-4">
            
            <div>
                <label class="block text-sm text-Dark-Grey dark:text-gray-300 font-medium ml-3 mb-1 transition-colors duration-300">Nombre completo</label>
                <input type="text" class="w-full border border-Light-Grey dark:border-gray-600 text-Dark-Grey dark:text-gray-200 rounded-full px-5 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue focus:border-transparent bg-white dark:bg-dark-card placeholder-gray-400 dark:placeholder-gray-500 transition-colors duration-300">
            </div>

            <div>
                <label class="block text-sm text-Dark-Grey dark:text-gray-300 font-medium ml-3 mb-1 transition-colors duration-300">Fecha de nacimiento</label>
                <input type="date" class="w-full border border-Light-Grey dark:border-gray-600 text-Dark-Grey dark:text-gray-200 rounded-full px-5 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue focus:border-transparent bg-white dark:bg-dark-card transition-colors duration-300" style="color-scheme: light dark;">
            </div>

            <div>
                <label class="block text-sm text-Dark-Grey dark:text-gray-300 font-medium ml-3 mb-1 transition-colors duration-300">Correo electrónico</label>
                <input type="email" class="w-full border border-Light-Grey dark:border-gray-600 text-Dark-Grey dark:text-gray-200 rounded-full px-5 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue focus:border-transparent bg-white dark:bg-dark-card placeholder-gray-400 dark:placeholder-gray-500 transition-colors duration-300">
            </div>

            <div>
                <label class="block text-sm text-Dark-Grey dark:text-gray-300 font-medium ml-3 mb-1 transition-colors duration-300">Contraseña</label>
                <input type="password" class="w-full border border-Light-Grey dark:border-gray-600 text-Dark-Grey dark:text-gray-200 rounded-full px-5 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue focus:border-transparent bg-white dark:bg-dark-card placeholder-gray-400 dark:placeholder-gray-500 transition-colors duration-300">
            </div>
            
            <div>
                <label class="block text-sm text-Dark-Grey dark:text-gray-300 font-medium ml-3 mb-1 transition-colors duration-300">Confirmar contraseña</label>
                <input type="password" class="w-full border border-Light-Grey dark:border-gray-600 text-Dark-Grey dark:text-gray-200 rounded-full px-5 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue focus:border-transparent bg-white dark:bg-dark-card placeholder-gray-400 dark:placeholder-gray-500 transition-colors duration-300">
            </div>

            <div class="flex flex-col gap-3 mt-4">
                <button type="submit" class="w-full bg-blue hover:bg-light-blue text-white font-medium py-2.5 rounded-full transition-colors shadow-sm text-lg">
                    Registrarme
                </button>
                
                <a href="login.html" class="block w-full bg-white dark:bg-dark-card border border-Light-Grey dark:border-gray-600 hover:bg-gray-50 dark:hover:bg-gray-800 text-Dark-Grey dark:text-gray-200 font-medium py-2.5 rounded-full transition-colors text-center">
                    Ya tengo una cuenta
                </a>
            </div>

        </form>
    </div>
</body>
</html>
